server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bật gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml
               font/woff2 application/woff2;

    # Cache static assets dài hạn (Vite tạo tên file có hash)
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy tất cả request /api/* đến api-server container
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;

        # Hỗ trợ SSE (Server-Sent Events) — dùng cho streaming AI
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout dài hơn cho SSE streaming
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — tất cả route đều trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
