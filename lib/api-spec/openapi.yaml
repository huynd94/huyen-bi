openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: config
    description: Public and admin configuration endpoints
  - name: openai
    description: OpenAI AI chat and operations
  - name: mysticism
    description: Mysticism AI interpretation endpoints
  - name: readings
    description: Saved readings and public share links
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /config/public:
    get:
      operationId: getPublicConfig
      tags: [config]
      summary: Get public (non-secret) runtime configuration
      description: >
        Returns server configuration safe to expose to anonymous callers.
        The `adminConfigured` field is only present when the caller is
        authenticated as an admin (Clerk `publicMetadata.role === "admin"`);
        it is omitted entirely for anonymous and non-admin callers to avoid
        leaking deployment provisioning state.
      responses:
        "200":
          description: Public configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicConfig"
  /readings:
    get:
      operationId: listReadings
      tags: [readings]
      summary: List saved readings for the authenticated user
      responses:
        "200":
          description: List of saved readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedReading"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createReading
      tags: [readings]
      summary: Save a new reading for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReadingBody"
      responses:
        "201":
          description: Created saved reading
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReading"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /readings/{id}:
    patch:
      operationId: patchReading
      tags: [readings]
      summary: Update saved reading title or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchReadingBody"
      responses:
        "200":
          description: Updated saved reading
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReading"
        "400":
          description: Invalid id or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reading not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteReading
      tags: [readings]
      summary: Delete a saved reading
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReadingResponse"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reading not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /readings/{id}/share:
    post:
      operationId: shareReading
      tags: [readings]
      summary: Create or reuse an active share token for a saved reading
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Share token for the reading
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareReadingResponse"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Reading not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /share/{token}:
    get:
      operationId: getSharedReading
      tags: [readings]
      summary: Get a saved reading through a public share token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public shared reading
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedReading"
        "404":
          description: Share link invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /mysticism/ai-interpret:
    post:
      operationId: aiInterpretMysticism
      tags: [mysticism]
      summary: Get AI interpretation for a mysticism reading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiInterpretBody"
      responses:
        "200":
          description: SSE stream of AI interpretation
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PublicConfig:
      type: object
      description: >
        Public server configuration. `adminConfigured` is present only when
        the caller is an authenticated admin, and is omitted entirely for
        anonymous and non-admin callers.
      properties:
        serverKeyConfigured:
          type: boolean
          description: Whether the server has an AI API key configured.
        provider:
          type: string
          description: Configured AI provider (e.g. `openai`, `gemini`, `server`).
        model:
          type: string
          description: Configured AI model identifier.
        rateLimitPerHour:
          type: integer
          description: Rate limit per hour when using the server-managed AI key.
        rateLimitPerDay:
          type: integer
          description: Rate limit per day when using the server-managed AI key.
        adminConfigured:
          type: boolean
          nullable: true
          description: >
            True when Clerk admin credentials are configured. Present only for
            admin callers; omitted for anonymous and non-admin callers.
      required:
        - serverKeyConfigured
        - provider
        - model
        - rateLimitPerHour
        - rateLimitPerDay
    JsonObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - error
    SavedReading:
      type: object
      properties:
        id:
          type: integer
        module:
          type: string
        title:
          type: string
        input_data:
          $ref: "#/components/schemas/JsonObject"
        result_data:
          $ref: "#/components/schemas/JsonObject"
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - module
        - title
        - input_data
        - result_data
        - created_at
    SharedReading:
      type: object
      properties:
        id:
          type: integer
        module:
          type: string
        title:
          type: string
        input_data:
          $ref: "#/components/schemas/JsonObject"
        result_data:
          $ref: "#/components/schemas/JsonObject"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - module
        - title
        - input_data
        - result_data
        - created_at
    CreateReadingBody:
      type: object
      properties:
        module:
          type: string
          minLength: 1
          maxLength: 50
        title:
          type: string
          minLength: 1
          maxLength: 200
        input_data:
          $ref: "#/components/schemas/JsonObject"
        result_data:
          $ref: "#/components/schemas/JsonObject"
        notes:
          type: string
          maxLength: 2000
          nullable: true
      required:
        - module
        - title
    PatchReadingBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: string
          maxLength: 2000
          nullable: true
      minProperties: 1
      additionalProperties: false
    DeleteReadingResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    ShareReadingResponse:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
      required:
        - token
        - expiresAt
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AiInterpretBody:
      type: object
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 50
          description: "Type of reading: numerology, batu, or iching"
        context:
          type: string
          minLength: 1
          maxLength: 8000
          description: "The reading data as a formatted string for AI to interpret"
        question:
          type: string
          maxLength: 1000
          description: "Optional specific question from the user"
      required:
        - type
        - context
